<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            color: #2b2b2b;
            background: #f4f4f4;
        }

        .table-wrapper {
            margin-top: 1.5rem;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            max-width: 900px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-width: 260px;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background-color: #e9ecef;
            padding: 0.75rem;
            text-align: left;
            cursor: pointer;
            user-select: none;
            border-bottom: 2px solid #d6d6d6;
        }

        tbody td {
            padding: 0.75rem;
            border-bottom: 1px solid #e1e1e1;
        }

        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tbody tr:nth-child(even) {
            background-color: #f1f1f1;
        }

        .pager {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .pager button {
            border: 1px solid #c2c2c2;
            background: #fafafa;
            border-radius: 4px;
            padding: 0.35rem 0.7rem;
            cursor: pointer;
        }

        .pager button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .hint {
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
<h1 th:text="'Hello World!'">Hello World!</h1>

<div class="table-wrapper">
    <div class="controls">
        <input id="searchInput" class="search-input" type="text" placeholder="Suche in Name, Straße, Ort oder PLZ ...">
        <span class="hint">Klick auf Spaltenkopf zum Sortieren</span>
    </div>

    <table>
        <thead>
        <tr>
            <th data-column="name">Name</th>
            <th data-column="street">Str.</th>
            <th data-column="city">Ort</th>
            <th data-column="postalCode">Postleitzahl</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr th:each="entry : ${entries}">
            <td th:text="${entry.name}">Name</td>
            <td th:text="${entry.street}">Straße</td>
            <td th:text="${entry.city}">Ort</td>
            <td th:text="${entry.postalCode}">PLZ</td>
        </tr>
        </tbody>
    </table>

    <div class="pager">
        <button id="prevPage" type="button">Zurück</button>
        <span id="pageInfo">Seite 1 von 1</span>
        <button id="nextPage" type="button">Weiter</button>
    </div>
</div>

<script th:inline="javascript">
    const sourceRows = /*[[${entries}]]*/ [];
    const rows = sourceRows.map(item => ({
        name: item.name,
        street: item.street,
        city: item.city,
        postalCode: item.postalCode
    }));

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');
    const headers = document.querySelectorAll('th[data-column]');

    const pageSize = 3;
    let currentPage = 1;
    let sortColumn = null;
    let sortDirection = 'asc';
    let filteredRows = [...rows];

    function renderTable() {
        const totalPages = Math.max(1, Math.ceil(filteredRows.length / pageSize));
        if (currentPage > totalPages) {
            currentPage = totalPages;
        }

        const startIndex = (currentPage - 1) * pageSize;
        const pageRows = filteredRows.slice(startIndex, startIndex + pageSize);

        tableBody.innerHTML = pageRows.map(row => `
            <tr>
                <td>${row.name}</td>
                <td>${row.street}</td>
                <td>${row.city}</td>
                <td>${row.postalCode}</td>
            </tr>
        `).join('');

        pageInfo.textContent = `Seite ${currentPage} von ${totalPages}`;
        prevPage.disabled = currentPage === 1;
        nextPage.disabled = currentPage === totalPages;
    }

    function applyFilterAndSort() {
        const query = searchInput.value.trim().toLowerCase();

        filteredRows = rows.filter(row =>
            Object.values(row).some(value => String(value).toLowerCase().includes(query))
        );

        if (sortColumn) {
            filteredRows.sort((a, b) => {
                const valueA = String(a[sortColumn]).toLowerCase();
                const valueB = String(b[sortColumn]).toLowerCase();

                if (valueA < valueB) return sortDirection === 'asc' ? -1 : 1;
                if (valueA > valueB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        currentPage = 1;
        renderTable();
    }

    searchInput.addEventListener('input', applyFilterAndSort);

    headers.forEach(header => {
        header.addEventListener('click', () => {
            const clickedColumn = header.dataset.column;
            if (sortColumn === clickedColumn) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = clickedColumn;
                sortDirection = 'asc';
            }
            applyFilterAndSort();
        });
    });

    prevPage.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    });

    nextPage.addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(filteredRows.length / pageSize));
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    });

    applyFilterAndSort();
</script>
</body>
</html>
