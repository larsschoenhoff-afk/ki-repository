<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World WebApp</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .card {
            padding: 2rem 2.5rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Hello World</h1>
</div>
</body>
</html>
